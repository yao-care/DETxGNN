# Germany BfArM/EMA Field Mapping Configuration

country_code: "DE"
language: "de"
regulatory_agency: "BfArM"

data_source:
  name: "EMA Medicines Data (proxy for German-authorized medicines)"
  url: "https://www.ema.europa.eu/en/medicines/download-medicine-data"
  format: Excel
  encoding: utf-8
  note: >
    BfArM AMIce 無批量下載功能 (僅網頁查詢 https://portal.bfarm.de/amguifree/)。
    使用 EMA 資料作為替代。EMA Medicines Report 包含集中授權程序的藥品，
    在所有 EU/EEA 成員國 (含德國) 有效。Article 57 Database 包含全 EEA
    已授權藥品的更完整資料。

  # 下載 URL (按優先順序)
  download_urls:
    - name: "EMA Medicines Report (集中授權藥品)"
      url: "https://www.ema.europa.eu/en/documents/report/medicines-output-medicines-report_en.xlsx"
    - name: "EMA Article 57 Product Data (全 EEA 已授權藥品)"
      url: "https://www.ema.europa.eu/en/documents/other/article-57-product-data_en.xlsx"

  # BfArM 參考資源 (無批量下載)
  bfarm_amice: "https://portal.bfarm.de/amguifree/"
  bfarm_stats_csv: "https://www.bfarm.de/SharedDocs/Downloads/DE/Service/Statistik/AM-Statistik/OpenData/verkehrsfaehige_arzneimittel.csv?__blob=publicationFile"

field_mapping:
  # EMA Medicines Report 欄位（2026-03 實測 header=8 後的實際欄位名稱）
  license_id: "EMA product number"
  brand_name_local: "Name of medicine"
  brand_name_en: "Active substance"
  ingredients: "Active substance"
  indication: "Therapeutic area (MeSH)"
  dosage_form: ""
  manufacturer: "Marketing authorisation developer / applicant / holder"
  approval_date: "Marketing authorisation date"
  status: "Medicine status"

  # 若使用 BfArM AMIce 手動匯出，欄位映射如下 (需手動切換)
  # license_id: "Zulassungsnummer"
  # brand_name_local: "Arzneimittelname"
  # brand_name_en: "Wirkstoff"
  # ingredients: "Wirkstoff"
  # indication: "Anwendungsgebiet"
  # dosage_form: "Darreichungsform"
  # manufacturer: "Pharmazeutischer Unternehmer"
  # approval_date: "Zulassungsdatum"
  # status: "Zulassungsstatus"

withdrawn_statuses:
  # EMA Medicines Report 狀態值 (2026-03 實測)
  - "Withdrawn"
  - "Suspended"
  - "Refused"
  - "Application withdrawn"
  - "Lapsed"
  - "Expired"
  - "Revoked"
  - "Withdrawn from rolling review"
  # BfArM 德語狀態 (若使用 AMIce 資料)
  - "Widerrufen"
  - "Ruhend"
  - "Erloschen"
  - "Zurückgenommen"

ingredient_separator: ","
date_format: "%d/%m/%Y"
encoding: "utf-8"
